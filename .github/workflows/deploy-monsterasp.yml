name: Deploy to Monster ASP

on:
  push:
    branches:
      - examen/reporte-fraudes
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    env:
      CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      WEBSITE_NAME: ${{ secrets.WEBSITE_NAME }}
      SERVER_COMPUTER_NAME: ${{ secrets.SERVER_COMPUTER_NAME }}
      SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify GitHub Secrets
        shell: pwsh
        run: ./HackerRank1/scripts/verify-deploy-secrets.ps1

      - name: Install Web Deploy
        shell: pwsh
        run: |
          choco install webdeploy -y --no-progress
          if (-not (Test-Path "${env:ProgramFiles}\IIS\Microsoft Web Deploy V3\msdeploy.exe")) {
            throw "msdeploy.exe no se instalo correctamente"
          }

      - name: Package for Monster ASP
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "HackerRank1-publish"
          & ./HackerRank1/scripts/package-for-monster.ps1 -PublishDir $publishDir | Out-Null
          echo "PUBLISH_DIR=$publishDir" >> $env:GITHUB_ENV

      - name: Deploy with MSDeploy
        shell: pwsh
        run: |
          & ./HackerRank1/scripts/deploy-msdeploy.ps1 `
            -PublishDir $env:PUBLISH_DIR `
            -WebsiteName $env:WEBSITE_NAME `
            -ServerComputerName $env:SERVER_COMPUTER_NAME `
            -ServerUsername $env:SERVER_USERNAME `
            -ServerPassword $env:SERVER_PASSWORD

      - name: Smoke test
        shell: pwsh
        run: |
          Start-Sleep -Seconds 8
          $baseUrl = if ($env:JWT_AUDIENCE -match '^https?://') { $env:JWT_AUDIENCE } else { "http://$($env:JWT_AUDIENCE)" }
          $swagger = Invoke-WebRequest -Uri "$baseUrl/swagger/index.html" -UseBasicParsing -TimeoutSec 60
          if ($swagger.StatusCode -ne 200) { throw "Swagger respondio $($swagger.StatusCode)" }
          $api = Invoke-WebRequest -Uri "$baseUrl/api/Fraud" -UseBasicParsing -TimeoutSec 60
          if ($api.StatusCode -ne 200) { throw "API Fraud respondio $($api.StatusCode)" }
